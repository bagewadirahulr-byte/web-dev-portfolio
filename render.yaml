services:
  - type: web
    name: snapurl
    env: python
    plan: free
    rootDir: python-url-shortener
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: DATABASE_PATH
        value: "/tmp/urls.db"
      - key: PYTHON_VERSION
        value: "3.11.0"
