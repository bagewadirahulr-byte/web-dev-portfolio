<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeatherVerse – Live Weather Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0f1a;
      --card: #141929;
      --border: rgba(255,255,255,0.07);
      --blue: #4f8ef7;
      --cyan: #00d4ff;
      --purple: #a855f7;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* ANIMATED BG */
    .bg-orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; animation: drift 8s ease-in-out infinite; }
    .orb1 { width: 400px; height: 400px; background: var(--blue); top: -100px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 300px; height: 300px; background: var(--purple); bottom: -50px; right: -50px; animation-delay: 3s; }
    .orb3 { width: 250px; height: 250px; background: var(--cyan); top: 50%; left: 50%; animation-delay: 5s; }
    @keyframes drift { 0%,100%{transform:translate(0,0);} 50%{transform:translate(30px,20px);} }

    /* LAYOUT */
    .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    header { text-align: center; margin-bottom: 40px; }
    header h1 { font-size: 2.8rem; font-weight: 900; background: linear-gradient(135deg, var(--cyan), var(--blue), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    header p { color: var(--muted); margin-top: 8px; font-size: 1rem; }

    /* SEARCH */
    .search-box { display: flex; gap: 12px; margin-bottom: 40px; }
    .search-box input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 22px; color: var(--text); font-size: 1rem; font-family: inherit; outline: none; transition: border-color 0.3s; }
    .search-box input:focus { border-color: var(--cyan); }
    .search-box input::placeholder { color: var(--muted); }
    .btn { background: linear-gradient(135deg, var(--cyan), var(--blue)); border: none; border-radius: 14px; padding: 16px 28px; color: #fff; font-size: 1rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: transform 0.2s, box-shadow 0.3s; box-shadow: 0 4px 20px rgba(79,142,247,0.4); }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(79,142,247,0.6); }
    .btn:active { transform: translateY(0); }

    /* MAIN WEATHER CARD */
    .weather-main { background: linear-gradient(135deg, #1a2440, #141929); border: 1px solid var(--border); border-radius: 24px; padding: 36px; margin-bottom: 24px; display: none; position: relative; overflow: hidden; }
    .weather-main::before { content:''; position:absolute; top:-50px; right:-50px; width:200px; height:200px; background: radial-gradient(circle, rgba(79,142,247,0.15), transparent); border-radius:50%; }
    .weather-main.show { display: block; animation: fadeUp 0.5s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }
    .city-row { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; }
    .city-name { font-size: 2rem; font-weight: 700; }
    .city-date { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }
    .temp-icon { text-align: right; }
    .weather-icon { font-size: 5rem; display: block; filter: drop-shadow(0 0 20px rgba(255,200,0,0.4)); }
    .temperature { font-size: 4rem; font-weight: 900; background: linear-gradient(135deg, #fff, var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .weather-desc { color: var(--muted); text-transform: capitalize; font-size: 1.1rem; margin-top: 8px; }
    .divider { height: 1px; background: var(--border); margin: 28px 0; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 16px; }
    .stat { background: rgba(255,255,255,0.04); border-radius: 14px; padding: 16px; text-align: center; }
    .stat-icon { font-size: 1.5rem; margin-bottom: 8px; }
    .stat-value { font-size: 1.2rem; font-weight: 700; color: var(--cyan); }
    .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

    /* FORECAST */
    .forecast-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .forecast-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px 16px; text-align: center; display: none; transition: transform 0.2s, box-shadow 0.3s; cursor: default; }
    .forecast-card.show { display: block; animation: fadeUp 0.5s ease; }
    .forecast-card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(79,142,247,0.2); }
    .forecast-day { font-size: 0.85rem; color: var(--muted); margin-bottom: 10px; }
    .forecast-icon { font-size: 2rem; margin-bottom: 10px; }
    .forecast-temp { font-size: 1.2rem; font-weight: 700; color: var(--cyan); }

    /* ERROR / LOADING */
    .message { text-align: center; padding: 30px; color: var(--muted); display: none; }
    .message.show { display: block; }
    .error-msg { color: #f87171; }

    /* POPULAR CITIES */
    .quick-cities { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
    .quick-btn { background: var(--card); border: 1px solid var(--border); border-radius: 50px; padding: 8px 18px; color: var(--muted); font-size: 0.85rem; font-family: inherit; cursor: pointer; transition: all 0.2s; }
    .quick-btn:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,212,255,0.05); }
    @media(max-width:600px){
      .container{padding:20px 12px}
      header h1{font-size:1.8rem}
      .search-box{flex-direction:column}
      .btn{width:100%;padding:14px}
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      .city-row{flex-direction:column;gap:10px}
      .temp-icon{text-align:left}
      .weather-icon{font-size:3.5rem}
      .temperature{font-size:3rem}
      .forecast-grid{grid-template-columns:repeat(2,1fr)}
      .quick-cities{gap:8px}
    }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="container">
    <header>
      <h1>🌤 WeatherVerse</h1>
      <p>Real-time weather dashboard — search any city worldwide</p>
    </header>

    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Search city... e.g. Mumbai, Tokyo, London" />
      <button class="btn" onclick="getWeather()">Search</button>
    </div>

    <div class="quick-cities">
      <button class="quick-btn" onclick="quickCity('Mumbai')">🇮🇳 Mumbai</button>
      <button class="quick-btn" onclick="quickCity('New York')">🗽 New York</button>
      <button class="quick-btn" onclick="quickCity('Tokyo')">🗼 Tokyo</button>
      <button class="quick-btn" onclick="quickCity('London')">🇬🇧 London</button>
      <button class="quick-btn" onclick="quickCity('Dubai')">🏙 Dubai</button>
      <button class="quick-btn" onclick="quickCity('Paris')">🗼 Paris</button>
    </div>

    <div class="message" id="loading">⏳ Fetching weather data...</div>
    <div class="message error-msg" id="error"></div>

    <div class="weather-main" id="mainCard">
      <div class="city-row">
        <div>
          <div class="city-name" id="cityName"></div>
          <div class="city-date" id="cityDate"></div>
          <div class="weather-desc" id="weatherDesc"></div>
        </div>
        <div class="temp-icon">
          <span class="weather-icon" id="weatherIcon"></span>
          <span class="temperature" id="temperature"></span>
        </div>
      </div>
      <div class="divider"></div>
      <div class="stats-grid">
        <div class="stat">
          <div class="stat-icon">💧</div>
          <div class="stat-value" id="humidity"></div>
          <div class="stat-label">Humidity</div>
        </div>
        <div class="stat">
          <div class="stat-icon">💨</div>
          <div class="stat-value" id="wind"></div>
          <div class="stat-label">Wind Speed</div>
        </div>
        <div class="stat">
          <div class="stat-icon">👁</div>
          <div class="stat-value" id="visibility"></div>
          <div class="stat-label">Visibility</div>
        </div>
        <div class="stat">
          <div class="stat-icon">🌡</div>
          <div class="stat-value" id="feelsLike"></div>
          <div class="stat-label">Feels Like</div>
        </div>
        <div class="stat">
          <div class="stat-icon">📊</div>
          <div class="stat-value" id="pressure"></div>
          <div class="stat-label">Pressure</div>
        </div>
        <div class="stat">
          <div class="stat-icon">☁️</div>
          <div class="stat-value" id="clouds"></div>
          <div class="stat-label">Cloudiness</div>
        </div>
      </div>
    </div>

    <div class="forecast-grid" id="forecastGrid"></div>
  </div>

  <script>
    // 🌍 NO API KEY NEEDED! Open-Meteo is 100% free forever.
    
    function quickCity(city) {
      document.getElementById('cityInput').value = city;
      getWeather();
    }

    document.getElementById('cityInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') getWeather();
    });

    // WMO Weather interpretation codes
    window.getWeatherInfo = function(code) {
      if (code === 0) return { i: '☀️', d: 'Clear sky' };
      if (code === 1 || code === 2) return { i: '🌤', d: 'Partly cloudy' };
      if (code === 3) return { i: '☁️', d: 'Overcast' };
      if (code >= 40 && code < 50) return { i: '🌫', d: 'Foggy' };
      if (code >= 51 && code < 60) return { i: '🌧', d: 'Drizzle' };
      if (code >= 60 && code < 70) return { i: '🌧', d: 'Rain' };
      if (code >= 70 && code < 80) return { i: '❄️', d: 'Snow' };
      if (code >= 80 && code < 95) return { i: '🌧', d: 'Showers' };
      if (code >= 95) return { i: '⛈', d: 'Thunderstorm' };
      return { i: '☁️', d: 'Unknown' };
    };

    const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    async function getWeather() {
      const city = document.getElementById('cityInput').value.trim();
      if (!city) return;

      document.getElementById('mainCard').classList.remove('show');
      document.getElementById('forecastGrid').innerHTML = '';
      document.getElementById('loading').classList.add('show');
      document.getElementById('error').classList.remove('show');

      try {
        // Step 1: Geocoding (Convert City Name to Coordinates)
        const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
        const geoData = await geoRes.json();
        
        if (!geoData.results || geoData.results.length === 0) {
          showError(`City "${city}" not found. Try Mumbai, London, or Tokyo.`);
          document.getElementById('loading').classList.remove('show');
          return;
        }

        const loc = geoData.results[0];
        const lat = loc.latitude;
        const lon = loc.longitude;
        const country = loc.country_code || '??';
        const cityName = loc.name;

        // Step 2: Fetch actual weather
        const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,surface_pressure,cloud_cover&hourly=temperature_2m,weather_code&timezone=auto`;
        const weatherRes = await fetch(weatherUrl);
        const data = await weatherRes.json();
        
        document.getElementById('loading').classList.remove('show');

        // Render Current Weather
        const nowIdx = new Date().getHours();
        const info = window.getWeatherInfo(data.current.weather_code);
        
        document.getElementById('cityName').textContent = `${cityName}, ${country}`;
        document.getElementById('cityDate').textContent = new Date().toUTCString().replace(' GMT','');
        document.getElementById('weatherDesc').textContent = info.d;
        document.getElementById('weatherIcon').textContent = info.i;
        
        document.getElementById('temperature').textContent = `${Math.round(data.current.temperature_2m)}°C`;
        document.getElementById('humidity').textContent = `${data.current.relative_humidity_2m}%`;
        document.getElementById('wind').textContent = `${data.current.wind_speed_10m} km/h`;
        document.getElementById('visibility').textContent = `${data.current.precipitation} mm`;
        document.getElementById('visibility').previousElementSibling.textContent = 'Visibility / Rain'; // changed label slightly
        document.getElementById('feelsLike').textContent = `${Math.round(data.current.apparent_temperature)}°C`;
        document.getElementById('pressure').textContent = `${data.current.surface_pressure} hPa`;
        document.getElementById('clouds').textContent = `${data.current.cloud_cover}%`;
        
        document.getElementById('mainCard').classList.add('show');

        // Render Forecast (Next 5 intervals)
        const grid = document.getElementById('forecastGrid');
        grid.innerHTML = '';
        
        let startIdx = 0;
        // find future time index
        for(let i=0; i<data.hourly.time.length; i++){
            if(new Date(data.hourly.time[i]).getTime() > Date.now()){
                startIdx = i;
                break;
            }
        }

        // Get 5 forecasts, starting from next few hours, spaced by 3 hours
        for (let j=0; j<5; j++) {
          const hIdx = startIdx + (j*3);
          if(hIdx >= data.hourly.time.length) break;
          
          const dt = new Date(data.hourly.time[hIdx]);
          const code = data.hourly.weather_code[hIdx];
          const temp = data.hourly.temperature_2m[hIdx];
          const inf = window.getWeatherInfo(code);
          
          const card = document.createElement('div');
          card.className = 'forecast-card show';
          card.innerHTML = `
            <div class="forecast-day">${days[dt.getDay()]} ${dt.getHours()}:00</div>
            <div class="forecast-icon">${inf.i}</div>
            <div class="forecast-temp">${Math.round(temp)}°C</div>
            <div style="font-size:0.75rem;color:var(--muted);margin-top:4px;">${inf.d}</div>
          `;
          grid.appendChild(card);
        }

      } catch (err) {
        document.getElementById('loading').classList.remove('show');
        console.warn('Network or API error, falling back to mock data.', err);
        showMockData(city);
      }
    }

    function showMockData(city) {
      document.getElementById('error').classList.remove('show');
      
      // Mock Current Weather
      document.getElementById('cityName').textContent = `${city} (MOCK)`;
      document.getElementById('cityDate').textContent = new Date().toUTCString().replace(' GMT','');
      const info = window.getWeatherInfo(1); // Partly cloudy
      document.getElementById('weatherDesc').textContent = info.d;
      document.getElementById('weatherIcon').textContent = info.i;
      
      document.getElementById('temperature').textContent = `28°C`;
      document.getElementById('humidity').textContent = `65%`;
      document.getElementById('wind').textContent = `12 km/h`;
      document.getElementById('visibility').textContent = `0 mm`;
      document.getElementById('visibility').previousElementSibling.textContent = 'Visibility / Rain';
      document.getElementById('feelsLike').textContent = `30°C`;
      document.getElementById('pressure').textContent = `1012 hPa`;
      document.getElementById('clouds').textContent = `40%`;
      
      document.getElementById('mainCard').classList.add('show');

      // Mock Forecast
      const grid = document.getElementById('forecastGrid');
      grid.innerHTML = '';
      let dt = new Date();
      for (let j=0; j<5; j++) {
        dt.setHours(dt.getHours() + 3);
        const code = j % 2 === 0 ? 0 : 3;
        const temp = 25 + j;
        const inf = window.getWeatherInfo(code);
        
        const card = document.createElement('div');
        card.className = 'forecast-card show';
        card.innerHTML = `
          <div class="forecast-day">${days[dt.getDay()]} ${dt.getHours()}:00</div>
          <div class="forecast-icon">${inf.i}</div>
          <div class="forecast-temp">${temp}°C</div>
          <div style="font-size:0.75rem;color:var(--muted);margin-top:4px;">${inf.d}</div>
        `;
        grid.appendChild(card);
      }
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = '⚠️ ' + msg;
      el.classList.add('show');
    }

    // Load default city
    quickCity('Mumbai');
  </script>
</body>
</html>
