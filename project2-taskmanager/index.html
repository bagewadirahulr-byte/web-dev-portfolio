<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow – Kanban Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <script src="../../shared/error-handler.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d14;
      --col: #13131f;
      --card: #1a1a2e;
      --border: rgba(255,255,255,0.08);
      --todo: #f59e0b;
      --progress: #3b82f6;
      --done: #10b981;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* BG */
    body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse at 20% 20%, rgba(59,130,246,0.06) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(16,185,129,0.06) 0%, transparent 50%); z-index:0; pointer-events:none; }

    header { position: relative; z-index:1; padding: 30px 30px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    .logo { font-size: 1.8rem; font-weight: 900; background: linear-gradient(135deg, #3b82f6, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .header-right { display: flex; gap: 12px; align-items: center; }
    .badge { background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 50px; padding: 6px 16px; font-size: 0.85rem; color: var(--muted); }
    .add-task-btn { background: linear-gradient(135deg, #3b82f6, #10b981); border: none; border-radius: 12px; padding: 12px 22px; color: #fff; font-size: 0.9rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: transform 0.2s, box-shadow 0.3s; box-shadow: 0 4px 20px rgba(59,130,246,0.3); }
    .add-task-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(59,130,246,0.5); }

    /* BOARD */
    .board { position: relative; z-index:1; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 24px 30px; min-height: calc(100vh - 120px); }
    .column { background: var(--col); border: 1px solid var(--border); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 14px; min-height: 200px; }
    .col-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .col-title { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .col-dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-todo { background: var(--todo); box-shadow: 0 0 8px var(--todo); }
    .dot-progress { background: var(--progress); box-shadow: 0 0 8px var(--progress); }
    .dot-done { background: var(--done); box-shadow: 0 0 8px var(--done); }
    .col-count { background: rgba(255,255,255,0.08); border-radius: 50px; padding: 2px 10px; font-size: 0.8rem; color: var(--muted); }
    .drop-zone { flex: 1; min-height: 60px; border-radius: 12px; border: 2px dashed transparent; transition: border-color 0.2s, background 0.2s; }
    .drop-zone.drag-over { border-color: var(--progress); background: rgba(59,130,246,0.05); }

    /* TASK CARD */
    .task-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; cursor: grab; transition: transform 0.2s, box-shadow 0.3s; position: relative; }
    .task-card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .task-card.dragging { opacity: 0.4; transform: rotate(3deg); cursor: grabbing; }
    .task-priority { display: inline-block; font-size: 0.7rem; font-weight: 600; padding: 3px 10px; border-radius: 50px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .p-high { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .p-medium { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
    .p-low { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
    .task-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
    .task-desc { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
    .task-footer { display: flex; justify-content: space-between; align-items: center; }
    .task-tag { background: rgba(59,130,246,0.1); color: #60a5fa; font-size: 0.75rem; padding: 3px 10px; border-radius: 50px; border: 1px solid rgba(59,130,246,0.2); }
    .task-actions { display: flex; gap: 8px; }
    .task-btn { background: none; border: none; cursor: pointer; font-size: 0.9rem; opacity: 0.5; transition: opacity 0.2s; padding: 4px; border-radius: 6px; }
    .task-btn:hover { opacity: 1; background: rgba(255,255,255,0.08); }

    /* MODAL */
    .modal-overlay { position: fixed; inset:0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 100; display: none; justify-content: center; align-items: center; }
    .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    .modal { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 32px; width: 100%; max-width: 480px; margin: 20px; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from{transform:translateY(30px);opacity:0;} to{transform:translateY(0);opacity:1;} }
    .modal h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 24px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
    .form-control { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--text); font-size: 0.9rem; font-family: inherit; outline: none; transition: border-color 0.3s; resize: vertical; }
    .form-control:focus { border-color: #3b82f6; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn-cancel { flex:1; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--muted); font-family: inherit; font-size: 0.9rem; cursor: pointer; transition: background 0.2s; }
    .btn-cancel:hover { background: rgba(255,255,255,0.1); }
    .btn-save { flex:2; background: linear-gradient(135deg, #3b82f6, #10b981); border: none; border-radius: 12px; padding: 12px; color: #fff; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
    .btn-save:hover { transform: translateY(-1px); }
    @media(max-width:600px){
      header{padding:20px 16px 0}
      .logo{font-size:1.4rem}
      .board{grid-template-columns:1fr!important;padding:16px;gap:16px}
      .column{min-height:120px}
      .modal{padding:20px 16px}
      .form-row{grid-template-columns:1fr!important}
    }
  </style>
</head>
<body>

<header>
  <div class="logo">⚡ TaskFlow</div>
  <div class="header-right">
    <div class="badge" id="totalBadge">0 tasks</div>
    <button class="add-task-btn" onclick="openModal()">+ Add Task</button>
  </div>
</header>

<div class="board">
  <div class="column">
    <div class="col-header">
      <div class="col-title"><span class="col-dot dot-todo"></span>To Do</div>
      <div class="col-count" id="todoCount">0</div>
    </div>
    <div class="drop-zone" id="todo" ondragover="dragOver(event)" ondrop="drop(event,'todo')" ondragleave="dragLeave(event)"></div>
  </div>
  <div class="column">
    <div class="col-header">
      <div class="col-title"><span class="col-dot dot-progress"></span>In Progress</div>
      <div class="col-count" id="progressCount">0</div>
    </div>
    <div class="drop-zone" id="progress" ondragover="dragOver(event)" ondrop="drop(event,'progress')" ondragleave="dragLeave(event)"></div>
  </div>
  <div class="column">
    <div class="col-header">
      <div class="col-title"><span class="col-dot dot-done"></span>Done ✓</div>
      <div class="col-count" id="doneCount">0</div>
    </div>
    <div class="drop-zone" id="done" ondragover="dragOver(event)" ondrop="drop(event,'done')" ondragleave="dragLeave(event)"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>✨ New Task</h2>
    <div class="form-group">
      <label>Task Title *</label>
      <input class="form-control" id="taskTitle" placeholder="What needs to be done?" />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea class="form-control" id="taskDesc" rows="3" placeholder="Add some details..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Priority</label>
        <select class="form-control" id="taskPriority">
          <option value="high">🔴 High</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tag</label>
        <input class="form-control" id="taskTag" placeholder="e.g. Design, Dev" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="addTask()">Add Task</button>
    </div>
  </div>
</div>

<script>
  let tasks = [];
  try {
    tasks = JSON.parse(localStorage.getItem('taskflow') || '[]');
  } catch (e) {
    console.error('Storage access failed', e);
    if (window.ErrorHandler) window.ErrorHandler.showToast('Could not load saved tasks. Using defaults.', 'info');
  }
  let draggedId = null;

  const defaultTasks = [
    { id: 1, title: 'Design Homepage Layout', desc: 'Create wireframes for the new homepage', priority: 'high', tag: 'Design', status: 'todo' },
    { id: 2, title: 'Build Weather API Integration', desc: 'Connect OpenWeatherMap API to fetch live data', priority: 'high', tag: 'Dev', status: 'progress' },
    { id: 3, title: 'Fix Navigation Bug', desc: 'Mobile menu not closing after click', priority: 'medium', tag: 'Bug', status: 'progress' },
    { id: 4, title: 'Write README documentation', desc: 'Document all project features and setup steps', priority: 'low', tag: 'Docs', status: 'todo' },
    { id: 5, title: 'Setup project repository', desc: 'Initialize Git and push to GitHub', priority: 'medium', tag: 'Dev', status: 'done' },
    { id: 6, title: 'Color palette design', desc: 'Choose brand colors', priority: 'low', tag: 'Design', status: 'done' },
  ];

  if (tasks.length === 0) { tasks = defaultTasks; save(); }

  function save() { 
    try {
      localStorage.setItem('taskflow', JSON.stringify(tasks)); 
    } catch (e) {
      console.warn('Could not save tasks', e);
      if (window.ErrorHandler) window.ErrorHandler.showToast('Storage full or disabled. Changes won\'t persist.', 'info');
    }
  }

  function render() {
    ['todo', 'progress', 'done'].forEach(status => {
      const zone = document.getElementById(status);
      zone.innerHTML = '';
      const filtered = tasks.filter(t => t.status === status);
      filtered.forEach(task => {
        const card = document.createElement('div');
        card.className = 'task-card';
        card.draggable = true;
        card.dataset.id = task.id;
        card.innerHTML = `
          <div class="task-priority p-${task.priority}">${task.priority}</div>
          <div class="task-title">${task.title}</div>
          ${task.desc ? `<div class="task-desc">${task.desc}</div>` : ''}
          <div class="task-footer">
            <span class="task-tag">${task.tag || 'General'}</span>
            <div class="task-actions">
              ${status !== 'todo' ? `<button class="task-btn" onclick="moveTask(${task.id}, '${status === 'done' ? 'progress' : 'todo'}')" title="Move Left">◀</button>` : ''}
              ${status !== 'done' ? `<button class="task-btn" onclick="moveTask(${task.id}, '${status === 'todo' ? 'progress' : 'done'}')" title="Move Right">▶</button>` : ''}
              <button class="task-btn" onclick="deleteTask(${task.id})" title="Delete">🗑</button>
            </div>
          </div>
        `;
        card.addEventListener('dragstart', () => { draggedId = task.id; card.classList.add('dragging'); });
        card.addEventListener('dragend', () => { card.classList.remove('dragging'); });
        zone.appendChild(card);
      });
      document.getElementById(status === 'todo' ? 'todoCount' : status === 'progress' ? 'progressCount' : 'doneCount').textContent = filtered.length;
    });
    document.getElementById('totalBadge').textContent = `${tasks.length} tasks`;
  }

  function dragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
  function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
  function drop(e, status) {
    e.preventDefault(); e.currentTarget.classList.remove('drag-over');
    if (draggedId) { moveTask(draggedId, status); }
  }

  function moveTask(id, newStatus) {
    const task = tasks.find(t => t.id === id);
    if (task) { task.status = newStatus; save(); render(); }
  }

  function openModal() { document.getElementById('modalOverlay').classList.add('open'); document.getElementById('taskTitle').focus(); }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); document.getElementById('taskTitle').value = ''; document.getElementById('taskDesc').value = ''; document.getElementById('taskTag').value = ''; }

  function addTask() {
    const title = document.getElementById('taskTitle').value.trim();
    if (!title) { alert('Please enter a task title!'); return; }
    const task = {
      id: Date.now(),
      title,
      desc: document.getElementById('taskDesc').value.trim(),
      priority: document.getElementById('taskPriority').value,
      tag: document.getElementById('taskTag').value.trim() || 'General',
      status: 'todo'
    };
    tasks.push(task); save(); render(); closeModal();
  }

  function deleteTask(id) {
    if (confirm('Delete this task?')) { tasks = tasks.filter(t => t.id !== id); save(); render(); }
  }

  document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

  render();
</script>
</body>
</html>
